<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
<meta name="theme-color" content="#5a9fff" />
<title>みこちゃん大冒険</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  font-family: "Press Start 2P", monospace;
  color: #fff;
  background: #000;
  touch-action: none; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#app {
  display: flex; flex-direction: column;
  height: 100dvh; padding: 6px 8px; gap: 6px;
  max-width: 600px; margin: 0 auto;
}
header {
  display: flex; justify-content: space-between; align-items: center;
}
.title { font-size: 12px; margin: 0; color: #fff; text-shadow: 2px 2px 0 #c33; }
.icon-btn {
  background: #fff; border: 2px solid #000; color: #000;
  padding: 4px 8px; font-family: inherit; font-size: 9px;
  cursor: pointer;
}
.stage-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  min-height: 0; max-width: 100%;
}
canvas#game {
  display: block; image-rendering: pixelated;
  background: #5a9fff;
  border: 3px solid #000;
  max-width: 100%; max-height: 100%;
  height: auto;
}
.controls {
  display: grid; grid-template-columns: 1.4fr 1fr; gap: 12px;
  padding-bottom: 4px;
}
.dpad {
  display: grid; grid-template-columns: 56px 56px;
  gap: 6px; justify-content: center;
}
.jumppad {
  display: flex; align-items: center; justify-content: center;
}
.pad-btn {
  background: rgba(255,255,255,0.15);
  border: 3px solid #fff; color: #fff;
  font-family: inherit; font-size: 16px; cursor: pointer;
  border-radius: 50%;
  width: 56px; height: 56px;
  display: flex; align-items: center; justify-content: center;
}
.pad-btn:active { background: rgba(255,255,255,0.45); transform: scale(0.92); }
.jumppad .pad-btn {
  width: 100px; height: 100px; font-size: 18px;
  background: rgba(255,200,80,0.3); border-color: #ffd56b; color: #ffd56b;
  box-shadow: 0 0 12px rgba(255,213,107,0.5);
}
.help {
  text-align: center; font-size: 8px; opacity: 0.8;
}
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center; z-index: 100; padding: 24px;
}
.overlay.show { display: flex; }
.overlay .box {
  background: #5a9fff; border: 4px solid #000;
  padding: 22px 26px; text-align: center; max-width: 320px;
  box-shadow: 6px 6px 0 #000;
}
.overlay h2 {
  margin: 0 0 10px; font-size: 16px;
  color: #ffd56b; text-shadow: 3px 3px 0 #000;
}
.overlay p { font-size: 9px; line-height: 1.7; opacity: 0.95; margin: 6px 0; }
.overlay button {
  background: #ffd56b; color: #000; border: 3px solid #000;
  padding: 10px 22px; font-family: inherit; font-size: 12px;
  cursor: pointer; box-shadow: 4px 4px 0 #000;
  margin-top: 8px;
  animation: blink 0.6s steps(2) infinite;
}
.overlay button:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 #000; }
@keyframes blink { 0%,100% { background:#ffd56b; } 50% { background:#fff; } }
</style>
<style>/* spark-ux-v1 */input:not([type=button]):not([type=submit]):not([readonly]),textarea,select{font-size:16px}html{-webkit-text-size-adjust:100%}body{overscroll-behavior:none}button{touch-action:manipulation}</style>
</head>
<body>
<div id="app">
  <header>
    <h1 class="title">みこちゃん大冒険</h1>
    <div style="display:flex;gap:5px;">
      <button class="icon-btn" id="btn-mute">SE</button>
      <button class="icon-btn" id="btn-restart">RST</button>
    </div>
  </header>
  <div class="stage-wrap">
    <canvas id="game" width="480" height="320"></canvas>
  </div>
  <div class="controls">
    <div class="dpad">
      <button class="pad-btn" data-act="left">◀</button>
      <button class="pad-btn" data-act="right">▶</button>
    </div>
    <div class="jumppad">
      <button class="pad-btn" data-act="jump">JUMP</button>
    </div>
  </div>
  <div class="help">← → 移動 ・ Space/↑ ジャンプ ・ ?ブロック叩く・コインGET</div>
</div>

<div class="overlay show" id="start-overlay">
  <div class="box">
    <h2>みこちゃん大冒険</h2>
    <p>左右に動いて、ジャンプしてゴール！<br/>?ブロックを叩くとコイン。<br/>穴に落ちないでね！</p>
    <button id="btn-start">▶ START</button>
  </div>
</div>
<div class="overlay" id="end-overlay">
  <div class="box">
    <h2 id="end-title">CLEAR!</h2>
    <p id="end-msg">クリア！</p>
    <p>SCORE <span id="end-score">0</span></p>
    <button id="btn-again">▶ もういちど</button>
  </div>
</div>

<script>
(() => {
  'use strict';
  const TILE = 32;
  const VIEW_W = 480, VIEW_H = 320; // logical canvas
  const $ = (id) => document.getElementById(id);
  const canvas = $('game');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  canvas.width = VIEW_W * dpr; canvas.height = VIEW_H * dpr;
  canvas.style.width = VIEW_W + 'px'; canvas.style.height = VIEW_H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.imageSmoothingEnabled = false;

  // Preload character sprite. We re-draw it into an offscreen canvas and
  // turn any near-white pixels transparent so even an opaque source PNG
  // shows up cleanly.
  const mikoSprite = document.createElement('canvas');
  let mikoLoaded = false;
  {
    const src = new Image();
    src.crossOrigin = 'anonymous';
    src.onload = () => {
      mikoSprite.width = src.naturalWidth;
      mikoSprite.height = src.naturalHeight;
      const c = mikoSprite.getContext('2d');
      c.drawImage(src, 0, 0);
      try {
        const id = c.getImageData(0, 0, mikoSprite.width, mikoSprite.height);
        const d = id.data;
        for (let i = 0; i < d.length; i += 4) {
          const r = d[i], g = d[i + 1], b = d[i + 2];
          // Knock out near-white pixels (background)
          if (r > 240 && g > 240 && b > 240) {
            d[i + 3] = 0;
          }
        }
        c.putImageData(id, 0, 0);
      } catch (err) {
        // If reading pixels fails (CORS), just use the image as-is
      }
      mikoLoaded = true;
    };
    src.src = 'assets/miko.png?v=3';
  }

  // ---------- Audio ----------
  const Sound = (() => {
    let ac = null, muted = localStorage.getItem('miko_muted') === '1';
    const en = () => { if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)(); if (ac.state === 'suspended') ac.resume(); return ac; };
    const beep = (f, d, t = 'square', g = 0.1) => {
      if (muted) return;
      const a = en(); const o = a.createOscillator(); const gn = a.createGain();
      o.type = t; o.frequency.value = f; gn.gain.value = g;
      gn.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + d);
      o.connect(gn).connect(a.destination); o.start(); o.stop(a.currentTime + d);
    };
    return {
      prime: en,
      coin: () => { beep(988, 0.06, 'square', 0.12); setTimeout(() => beep(1319, 0.12, 'square', 0.12), 60); },
      jump: () => beep(660, 0.08, 'square', 0.12),
      bump: () => beep(220, 0.06, 'square', 0.14),
      die:  () => [440,330,220,165].forEach((f,i) => setTimeout(() => beep(f, 0.18, 'sawtooth', 0.18), i*100)),
      clear:() => [523,659,784,1047].forEach((f,i) => setTimeout(() => beep(f, 0.14, 'triangle', 0.18), i*80)),
      toggle: () => { muted = !muted; localStorage.setItem('miko_muted', muted ? '1' : '0'); return muted; },
      isMuted: () => muted
    };
  })();
  $('btn-mute').textContent = Sound.isMuted() ? 'MUTE' : 'SE';

  // ---------- Stages (10 wide x 10 tall = visible region; world wider) ----------
  // Legend:
  //   '.' empty
  //   'G' ground (impassable)
  //   'B' brick
  //   '?' question block (gives coin)
  //   'C' coin (collectible)
  //   'F' flag (goal)
  //   'X' pit marker (visual gap; treated like empty floor — fall = die)
  // Stages are arrays of strings; height fixed at 10 rows.
  const STAGES = [
    [
      '..............................................',
      '..............................................',
      '..............................................',
      '..............................................',
      '..........?...........CC......................',
      '...........BBB......BBBB......?BB.............',
      '..CCC.........................................',
      '.BBBB.........................................',
      '.............................................F',
      'GGGGGGGGGGGG..GGGGGGGGGGGGG..GGGGGGGGGGGGGGGGGG'
    ],
    [
      '..............................................',
      '..............................................',
      '..............................................',
      '...............?....CC........................',
      '..........CC..BBB..BBBB.....?B.................',
      '.........BBB.........................CCCC.....',
      '..?...................?B...........BBBBBB.....',
      '.BBB...........BB.............................',
      '.............................................F',
      'GGGGGGGGGGG..GGGGGGGG..GGGGGGGGG..GGGGGGGGGGGGG'
    ],
    [
      '..............................................',
      '..........................................CC.',
      '...............CC........CC..............BBBB.',
      '..........?...BBBB......BBBB....?B.............',
      '.................................?B...........',
      '..CC..........BB...........BB.........BB......',
      '.BBBB..........................................',
      '..............................................',
      '.............................................F',
      'GGGGGG..GGGG..GGGGGGGG..GGGG..GGGGGGGGGGGGGGGGG'
    ]
  ];

  // ---------- State ----------
  const state = {
    stageIdx: 0,
    grid: [],     // grid[y][x] mutable copy
    width: 0, height: 10,
    player: { x: 64, y: 0, vx: 0, vy: 0, w: 22, h: 28, onGround: false, facing: 1, dead: false },
    cam: 0,
    score: 0,
    lives: 2,
    keys: { left: false, right: false, jump: false, jumpHeld: false },
    paused: true,
    over: false,
    cleared: false,
    coinAnim: [], // floating +100 popups
    blockHits: [] // bounce animation for hit blocks
  };

  function loadStage(idx) {
    state.stageIdx = idx;
    const raw = STAGES[idx % STAGES.length];
    state.grid = raw.map((s) => s.split(''));
    state.width = raw[0].length;
    state.height = raw.length;
    state.player.x = 48;
    state.player.y = (state.height - 3) * TILE; // start a bit above ground
    state.player.vx = 0; state.player.vy = 0;
    state.player.facing = 1;
    state.player.dead = false;
    state.cam = 0;
    state.coinAnim = [];
    state.blockHits = [];
    state.cleared = false;
  }

  function tileAt(x, y) {
    const tx = Math.floor(x / TILE);
    const ty = Math.floor(y / TILE);
    if (ty < 0 || ty >= state.height) return '.';
    if (tx < 0 || tx >= state.width) return 'G';
    return state.grid[ty][tx];
  }
  function isSolid(c) { return c === 'G' || c === 'B' || c === '?' || c === 'b'; } // 'b' = used question (still solid)

  // ---------- Physics ----------
  function step(dt) {
    if (state.paused || state.over || state.player.dead || state.cleared) return;
    const p = state.player;
    const accel = 0.5;
    const maxVx = 3.4;
    if (state.keys.left)  p.vx = Math.max(p.vx - accel, -maxVx);
    if (state.keys.right) p.vx = Math.min(p.vx + accel,  maxVx);
    if (!state.keys.left && !state.keys.right) p.vx *= 0.82;
    if (p.vx > 0) p.facing = 1;
    if (p.vx < 0) p.facing = -1;

    // Jump (much higher than before)
    if (state.keys.jump && p.onGround) {
      p.vy = -13.5;
      p.onGround = false;
      state.keys.jumpHeld = true;
      Sound.jump();
    }
    // Jump cut (variable height) — only cut while still rising fast
    if (!state.keys.jumpHeld && p.vy < -5) p.vy = -5;
    state.keys.jump = false; // edge-trigger reset

    // Gravity (slightly weaker so jumps feel floaty)
    p.vy = Math.min(p.vy + 0.5, 14);

    // Move X
    p.x += p.vx;
    if (p.vx !== 0) {
      const dir = p.vx > 0 ? 1 : -1;
      const probeX = dir > 0 ? p.x + p.w / 2 : p.x - p.w / 2;
      const top = p.y - p.h + 2, bot = p.y - 2;
      for (let yy = top; yy <= bot; yy += TILE / 2) {
        if (isSolid(tileAt(probeX, yy))) {
          if (dir > 0) p.x = Math.floor(probeX / TILE) * TILE - p.w / 2;
          else p.x = Math.floor(probeX / TILE) * TILE + TILE + p.w / 2;
          p.vx = 0;
          break;
        }
      }
    }
    if (p.x - p.w / 2 < 0) { p.x = p.w / 2; p.vx = 0; }

    // Move Y
    p.y += p.vy;
    p.onGround = false;
    if (p.vy > 0) {
      // moving down
      const probeY = p.y;
      const left = p.x - p.w / 2 + 2, right = p.x + p.w / 2 - 2;
      for (let xx = left; xx <= right; xx += TILE / 2) {
        if (isSolid(tileAt(xx, probeY))) {
          p.y = Math.floor(probeY / TILE) * TILE;
          p.vy = 0;
          p.onGround = true;
          break;
        }
      }
    } else if (p.vy < 0) {
      // moving up — head bonk
      const probeY = p.y - p.h;
      const left = p.x - p.w / 2 + 2, right = p.x + p.w / 2 - 2;
      let hitBlockX = null;
      for (let xx = left; xx <= right; xx += TILE / 2) {
        const c = tileAt(xx, probeY);
        if (isSolid(c)) {
          if (c === '?') {
            const tx = Math.floor(xx / TILE), ty = Math.floor(probeY / TILE);
            hitBlockX = { tx, ty };
          }
          p.y = Math.floor(probeY / TILE) * TILE + TILE + p.h;
          p.vy = 0;
          Sound.bump();
          break;
        }
      }
      if (hitBlockX) {
        const { tx, ty } = hitBlockX;
        if (state.grid[ty][tx] === '?') {
          state.grid[ty][tx] = 'b'; // used
          state.score += 200;
          state.coinAnim.push({ x: tx * TILE + TILE / 2, y: ty * TILE - 4, life: 30, type: 'coin' });
          state.blockHits.push({ x: tx * TILE, y: ty * TILE, life: 12 });
          Sound.coin();
        }
      }
    }

    // Coin pickup
    {
      const left = Math.floor((p.x - p.w / 2) / TILE);
      const right = Math.floor((p.x + p.w / 2) / TILE);
      const top = Math.floor((p.y - p.h) / TILE);
      const bot = Math.floor((p.y - 2) / TILE);
      for (let ty = top; ty <= bot; ty++) {
        for (let tx = left; tx <= right; tx++) {
          if (tx < 0 || ty < 0 || ty >= state.height || tx >= state.width) continue;
          if (state.grid[ty][tx] === 'C') {
            state.grid[ty][tx] = '.';
            state.score += 100;
            state.coinAnim.push({ x: tx * TILE + TILE / 2, y: ty * TILE - 4, life: 30, type: 'coin' });
            Sound.coin();
          }
          if (state.grid[ty][tx] === 'F') {
            // touched flag — clear stage
            state.cleared = true;
            Sound.clear();
            setTimeout(() => nextStage(), 1500);
            return;
          }
        }
      }
    }

    // Pit fall
    if (p.y > state.height * TILE + 40) {
      die();
      return;
    }

    // Camera follows player
    const target = p.x - VIEW_W * 0.4;
    const maxCam = state.width * TILE - VIEW_W;
    state.cam = Math.max(0, Math.min(maxCam, target));

    // Animations age
    for (let i = state.coinAnim.length - 1; i >= 0; i--) {
      const a = state.coinAnim[i];
      a.life--; a.y -= 1.5;
      if (a.life <= 0) state.coinAnim.splice(i, 1);
    }
    for (let i = state.blockHits.length - 1; i >= 0; i--) {
      state.blockHits[i].life--;
      if (state.blockHits[i].life <= 0) state.blockHits.splice(i, 1);
    }
  }

  function die() {
    if (state.player.dead) return;
    state.player.dead = true;
    state.lives--;
    Sound.die();
    setTimeout(() => {
      if (state.lives < 0) {
        endGame(false);
      } else {
        loadStage(state.stageIdx);
      }
    }, 1100);
  }
  function nextStage() {
    if (state.stageIdx + 1 >= STAGES.length) {
      endGame(true);
    } else {
      loadStage(state.stageIdx + 1);
    }
  }
  function endGame(cleared) {
    state.over = true;
    $('end-title').textContent = cleared ? 'ALL CLEAR!' : 'GAME OVER';
    $('end-msg').textContent = cleared ? '全ステージ クリア！' : 'もう一度頑張ろう！';
    $('end-score').textContent = state.score;
    $('end-overlay').classList.add('show');
  }

  // ---------- Render ----------
  function render() {
    // Sky
    ctx.fillStyle = '#5a9fff';
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    // Clouds (parallax-ish)
    ctx.fillStyle = '#fff';
    const cloudOff = (state.cam * 0.4) % 200;
    for (let i = -1; i < 4; i++) {
      const cx = i * 200 + 30 - cloudOff;
      const cy = 40 + (i % 2) * 30;
      drawCloud(cx, cy);
    }
    // Tiles
    const tileXStart = Math.floor(state.cam / TILE);
    const tileXEnd = Math.ceil((state.cam + VIEW_W) / TILE);
    for (let ty = 0; ty < state.height; ty++) {
      for (let tx = tileXStart; tx <= tileXEnd; tx++) {
        if (tx < 0 || tx >= state.width) continue;
        const c = state.grid[ty][tx];
        const sx = tx * TILE - state.cam;
        const sy = ty * TILE;
        if (c === 'G') drawGround(sx, sy);
        else if (c === 'B') drawBrick(sx, sy);
        else if (c === '?') {
          const bump = state.blockHits.find((b) => b.x - state.cam === sx && b.y === sy);
          drawQuestion(sx, sy - (bump ? Math.sin((1 - bump.life / 12) * Math.PI) * 6 : 0));
        }
        else if (c === 'b') drawUsed(sx, sy);
        else if (c === 'C') drawCoin(sx + TILE / 2, sy + TILE / 2);
        else if (c === 'F') drawFlag(sx, sy);
      }
    }
    // Coin floaters
    for (const a of state.coinAnim) {
      ctx.save();
      ctx.font = 'bold 10px "Press Start 2P", monospace';
      ctx.fillStyle = '#ffd56b';
      ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
      const txt = '+100';
      ctx.strokeText(txt, a.x - state.cam - 18, a.y);
      ctx.fillText(txt, a.x - state.cam - 18, a.y);
      ctx.restore();
    }
    // Player
    drawMiko(state.player.x - state.cam, state.player.y);

    // HUD
    ctx.font = 'bold 10px "Press Start 2P", monospace';
    ctx.lineWidth = 3; ctx.strokeStyle = '#000';
    ctx.fillStyle = '#fff';
    ctx.strokeText('LIVES: ' + Math.max(0, state.lives), 10, 20);
    ctx.fillText  ('LIVES: ' + Math.max(0, state.lives), 10, 20);
    ctx.strokeText('STAGE: ' + (state.stageIdx + 1), 10, 36);
    ctx.fillText  ('STAGE: ' + (state.stageIdx + 1), 10, 36);
    ctx.strokeText('SCORE: ' + state.score, 10, 52);
    ctx.fillText  ('SCORE: ' + state.score, 10, 52);

    if (state.cleared) {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(0, 100, VIEW_W, 80);
      ctx.font = 'bold 24px "Press Start 2P", monospace';
      ctx.fillStyle = '#ffd56b';
      ctx.strokeText('CLEAR!', VIEW_W / 2 - 70, 150);
      ctx.fillText('CLEAR!', VIEW_W / 2 - 70, 150);
    }
  }

  function drawCloud(x, y) {
    ctx.beginPath();
    ctx.arc(x, y, 12, 0, Math.PI * 2);
    ctx.arc(x + 14, y - 4, 14, 0, Math.PI * 2);
    ctx.arc(x + 28, y, 12, 0, Math.PI * 2);
    ctx.arc(x + 14, y + 8, 14, 0, Math.PI * 2);
    ctx.fill();
  }
  function drawGround(x, y) {
    // Brick ground
    ctx.fillStyle = '#a25a2a';
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = '#7a4220';
    for (let i = 0; i < 2; i++) {
      const oy = y + i * 16;
      ctx.fillRect(x, oy, TILE, 2);
    }
    ctx.fillStyle = '#7a4220';
    ctx.fillRect(x + 14, y, 2, 16);
    ctx.fillRect(x + 6, y + 16, 2, 16);
    ctx.fillRect(x + 22, y + 16, 2, 16);
  }
  function drawBrick(x, y) {
    ctx.fillStyle = '#c87232';
    ctx.fillRect(x, y, TILE, TILE);
    ctx.fillStyle = '#8a4a1a';
    ctx.fillRect(x, y, TILE, 3);
    ctx.fillRect(x, y + 16, TILE, 2);
    ctx.fillRect(x, y + TILE - 3, TILE, 3);
    ctx.fillRect(x + 14, y, 2, 16);
    ctx.fillRect(x + 6, y + 16, 2, 16);
    ctx.fillRect(x + 22, y + 16, 2, 16);
  }
  function drawQuestion(x, y) {
    ctx.fillStyle = '#e8a23a';
    ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 1, y + 1, TILE - 2, 2);
    ctx.fillRect(x + 1, y + TILE - 3, TILE - 2, 2);
    ctx.fillRect(x + 1, y + 1, 2, TILE - 2);
    ctx.fillRect(x + TILE - 3, y + 1, 2, TILE - 2);
    // ? mark
    ctx.font = 'bold 18px "Press Start 2P", monospace';
    ctx.fillText('?', x + 8, y + 24);
  }
  function drawUsed(x, y) {
    ctx.fillStyle = '#9c6b1f';
    ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 1, y + 1, TILE - 2, 2);
    ctx.fillRect(x + 1, y + TILE - 3, TILE - 2, 2);
    ctx.fillRect(x + 1, y + 1, 2, TILE - 2);
    ctx.fillRect(x + TILE - 3, y + 1, 2, TILE - 2);
  }
  function drawCoin(cx, cy) {
    const t = performance.now();
    const w = Math.abs(Math.sin(t / 250)) * 8 + 4;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.ellipse(cx, cy, w, 9, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#a07000'; ctx.lineWidth = 1.5; ctx.stroke();
  }
  function drawFlag(x, y) {
    // Pole
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 14, y, 4, TILE);
    ctx.fillStyle = '#ff5577';
    ctx.beginPath();
    ctx.moveTo(x + 18, y + 4);
    ctx.lineTo(x + 28, y + 10);
    ctx.lineTo(x + 18, y + 16);
    ctx.closePath();
    ctx.fill();
  }
  function drawMiko(cx, gy) {
    // gy is the foot baseline (player.y is foot)
    const w = state.player.w, h = state.player.h;
    // Sprite is rendered slightly larger than the hitbox so the art looks right.
    const drawW = 38, drawH = 44;
    const x = cx - drawW / 2;
    const y = gy - drawH;
    const flip = state.player.facing < 0;

    // Walking bob / jump tilt
    const t = performance.now();
    const moving = Math.abs(state.player.vx) > 0.5 && state.player.onGround;
    const bob = moving ? Math.sin(t / 80) * 1.5 : 0;

    ctx.save();
    if (flip) {
      ctx.translate(cx, 0);
      ctx.scale(-1, 1);
      ctx.translate(-cx, 0);
    }
    if (mikoLoaded) {
      ctx.drawImage(mikoSprite, x, y + bob, drawW, drawH);
    } else {
      // Fallback: red rectangle until image loads
      ctx.fillStyle = '#e8133a';
      ctx.fillRect(cx - w / 2, gy - h, w, h);
    }
    ctx.restore();

    if (state.player.dead) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(cx - drawW / 2 - 4, gy - drawH - 6, drawW + 8, drawH + 12);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px "Press Start 2P", monospace';
      ctx.fillText('DEAD', cx - drawW / 2, gy - drawH / 2);
    }
  }

  // ---------- Loop ----------
  let lastTs = 0;
  function loop(ts) {
    const dt = (ts - lastTs) || 16; lastTs = ts;
    step(dt);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---------- Input ----------
  const setKey = (k, v) => { state.keys[k] = v; };
  function pressLeft(v)  { state.keys.left  = v; if (v) Sound.prime(); }
  function pressRight(v) { state.keys.right = v; if (v) Sound.prime(); }
  function pressJump(v)  {
    if (v) {
      state.keys.jump = true;
      state.keys.jumpHeld = true;
      Sound.prime();
    } else {
      state.keys.jumpHeld = false;
    }
  }
  window.addEventListener('keydown', (e) => {
    const k = e.key;
    if (k === 'ArrowLeft' || k === 'a' || k === 'A') { pressLeft(true); e.preventDefault(); }
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') { pressRight(true); e.preventDefault(); }
    else if (k === ' ' || k === 'ArrowUp' || k === 'w' || k === 'W' || k === 'z' || k === 'Z') { pressJump(true); e.preventDefault(); }
  }, { passive: false });
  window.addEventListener('keyup', (e) => {
    const k = e.key;
    if (k === 'ArrowLeft' || k === 'a' || k === 'A') pressLeft(false);
    else if (k === 'ArrowRight' || k === 'd' || k === 'D') pressRight(false);
    else if (k === ' ' || k === 'ArrowUp' || k === 'w' || k === 'W' || k === 'z' || k === 'Z') pressJump(false);
  });
  document.querySelectorAll('.pad-btn').forEach((b) => {
    const act = b.dataset.act;
    const on = (e) => {
      e.preventDefault();
      if (act === 'left') pressLeft(true);
      if (act === 'right') pressRight(true);
      if (act === 'jump') pressJump(true);
    };
    const off = (e) => {
      e.preventDefault();
      if (act === 'left') pressLeft(false);
      if (act === 'right') pressRight(false);
      if (act === 'jump') pressJump(false);
    };
    b.addEventListener('touchstart', on, { passive: false });
    b.addEventListener('touchend', off, { passive: false });
    b.addEventListener('touchcancel', off);
    b.addEventListener('mousedown', on);
    b.addEventListener('mouseup', off);
    b.addEventListener('mouseleave', off);
  });

  function startGame() {
    state.paused = false;
    state.over = false;
    state.lives = 2;
    state.score = 0;
    loadStage(0);
  }
  $('btn-start').addEventListener('click', () => {
    Sound.prime();
    $('start-overlay').classList.remove('show');
    startGame();
  });
  $('btn-again').addEventListener('click', () => {
    Sound.prime();
    $('end-overlay').classList.remove('show');
    startGame();
  });
  $('btn-restart').addEventListener('click', () => {
    if (!confirm('リスタートしますか？')) return;
    $('end-overlay').classList.remove('show');
    startGame();
  });
  $('btn-mute').addEventListener('click', () => {
    const m = Sound.toggle();
    $('btn-mute').textContent = m ? 'MUTE' : 'SE';
  });

  // initial
  loadStage(0);
})();
</script>
